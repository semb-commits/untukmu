<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buat Kamu</title>

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: transparent;
  color: #fff;
  text-align: center;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

.page {
  display: none;
  width: 100%;
  max-width: 450px;
  position: relative;
  min-height: 500px;
}

.page.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}

h1 {
  font-size: 2em;
  margin-bottom: 15px;
  font-weight: 700;
  text-shadow: 0 3px 20px rgba(0,0,0,0.6);
  position: relative;
  z-index: 2;
}

.typewriter {
  font-size: 1.1em;
  line-height: 1.9;
  font-weight: 400;
  text-shadow: 0 3px 15px rgba(0,0,0,0.7);
  text-align: center;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
  padding: 18px 20px;
  border-radius: 18px;
  position: relative;
  z-index: 2;
  max-width: 100%;
}

.video-wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;
}

video {
  width: 240px;
  height: 240px;
  object-fit: contain;
  background: transparent;
}

button {
  padding: 14px 40px;
  border: none;
  border-radius: 50px;
  background: rgba(255,255,255,0.95);
  color: #ff6b81;
  font-weight: 600;
  cursor: pointer;
  font-size: 1.1em;
  transition: 0.3s;
  margin-top: 15px;
  backdrop-filter: blur(10px);
  display: none;
  position: relative;
  z-index: 2;
}

button.show {
  display: inline-block;
}

button:hover {
  transform: scale(1.05);
  background: #fff;
}

.tap-hint {
  font-size: 0.85em;
  opacity: 0.8;
  margin-top: 15px;
  animation: pulse 2s infinite;
  display: none;
  position: relative;
  z-index: 2;
}

.tap-hint.show {
  display: block;
}

@keyframes pulse {
 0%, 100% { opacity: 0.8; }
 50% { opacity: 0.4; }
}

.cursor {
  display: inline-block;
  width: 2px;
  height: 1.2em;
  background: #fff;
  animation: blink 0.7s infinite;
  vertical-align: text-bottom;
}

@keyframes blink {
 0%, 50% { opacity: 1; }
 51%, 100% { opacity: 0; }
}
</style>
</head>
<body>

<!-- Halaman 1 -->
<div class="page active" id="page1" onclick="nextPage(1)">
  <h1 data-aos="fade-down">Hai Kamu...</h1>
  <div class="typewriter" id="text1"></div>
  <div class="tap-hint" id="hint1">Ketuk buat lanjut</div>
</div>

<!-- Halaman 2 -->
<div class="page" id="page2" onclick="nextPage(2)">
  <div class="video-wrapper">
    <video
      src="VID-20260604-WA6928.mp4"
      autoplay
      loop
      muted
      playsinline>
    </video>
  </div>
  <h1 data-aos="fade-down">Kamu Lucu Banget</h1>
  <div class="typewriter" id="text2"></div>
  <div class="tap-hint" id="hint2">Ketuk lagi ya</div>
</div>

<!-- Halaman 3 -->
<div class="page" id="page3">
  <h1 data-aos="fade-down">Jujur Aja...</h1>
  <div class="typewriter" id="text3"></div>
  <button id="btnWA" onclick="window.open('https://wa.me/62895351432524')">
    Mau dong 💌
  </button>
</div>

<script>
let currentPage = 1;
const totalPages = 3;
let isTyping = false;
let typingInterval;

const texts = {
 1: "Gue gak tau mulai dari mana, tapi tiap kali inget kamu, rasanya hari yang biasa aja jadi sedikit lebih terang. Boleh gak sih gue jujur? Dari dulu gue ngerasa ada yang beda setiap kali ngobrol sama kamu.",
 2: "Serius deh, cara kamu ketawa, cara kamu ngomong, semuanya bikin gue betah berlama-lama dengerin kamu. Ada hal tentang kamu yang bikin gue pengen kenal lebih jauh.",
 3: "Gue suka sama kamu. Gak sekedar suka ngobrol, tapi suka sama semua tentang kamu. Mau gak kita coba kenalan lebih jauh? Siapa tau kita emang cocok buat saling jaga."
};

AOS.init({
  once: false,
  offset: 50,
  duration: 600
});

window.onload = () => {
  typeWriter(1, texts[1], 'text1', () => {
    document.getElementById('hint1').classList.add('show');
  });
}

function typeWriter(page, text, elementId, callback) {
  if (isTyping) {
    clearInterval(typingInterval);
    document.getElementById(elementId).innerHTML = text;
    isTyping = false;
    if (callback) callback();
    return;
  }

  isTyping = true;
  let i = 0;
  const element = document.getElementById(elementId);
  element.innerHTML = '<span class="cursor"></span>';

  typingInterval = setInterval(() => {
    if (i < text.length) {
      element.innerHTML = text.substring(0, i+1) + '<span class="cursor"></span>';
      i++;
    } else {
      clearInterval(typingInterval);
      element.innerHTML = text;
      isTyping = false;
      if (callback) callback();
    }
  }, 40);
}

function nextPage(page) {
  if (page >= totalPages) return;

  document.getElementById(`page${page}`).classList.remove('active');
  currentPage = page + 1;
  document.getElementById(`page${currentPage}`).classList.add('active');
  AOS.refresh();

  setTimeout(() => {
    typeWriter(currentPage, texts[currentPage], `text${currentPage}`, () => {
      if (currentPage < totalPages) {
        document.getElementById(`hint${currentPage}`).classList.add('show');
      } else {
        setTimeout(() => {
          document.getElementById('btnWA').classList.add('show');
        }, 400);
      }
    });
  }, 200);
}

// Tap buat skip typing
document.addEventListener('click', (e) => {
  if (isTyping &&!e.target.closest('button')) {
    typeWriter(currentPage, texts[currentPage], `text${currentPage}`);
  }
});
</script>

</body>
</html>
